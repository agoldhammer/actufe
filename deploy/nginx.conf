# actufe site config — serve the static SPA build and proxy the API to actuproxy.
# Deploy: copy the contents of build/ to /var/www/actufe, fill in the actuproxy
# port below, then link this file into /etc/nginx/sites-enabled/.
#
# On tiny the app is instead served by the altsvr site at http://tiny:8080/news/
# out of /var/www/html/altsvr/news (a real directory owned by agold — NOT a
# symlink into ~agold: nginx runs as www-data, which can't traverse /home/agold,
# so a symlink 404s). Since it's served from the /news subpath there, the build
# MUST set the base path or /_app/* asset URLs resolve to the server root and 404:
#   BASE_PATH=/news npm run build
#   rsync -a --delete ~/Prog/actufe/build/ /var/www/html/altsvr/news/

server {
    listen 80;
    server_name _;                      # adjust to real hostname
    root /var/www/actufe;               # contents of build/

    # API: replaces the old Netlify connProxy function.
    # actuproxy serves at its root, so /api/articles?q maps to /?q
    # (the query string is forwarded automatically).
    # actuproxy runs on con1 under supervisor (actur-cloud.conf) at
    # 127.0.0.1:33433, exposed publicly as https://www.ghmr.net/actu/api/v1/.
    # Same-machine deploy (con1):
    #     proxy_pass http://127.0.0.1:33433/;
    # Remote deploy (e.g. tiny): proxy to the public endpoint instead —
    # NOT news.ghmr.net, which is the old Netlify frontend, not the API:
    #     proxy_pass https://www.ghmr.net/actu/api/v1/;
    #     proxy_ssl_server_name on;      # and drop the Host override below
    location = /api/articles {
        proxy_pass http://127.0.0.1:33433/;
        proxy_set_header Host $host;
    }

    # Hashed build assets: cache forever
    location /_app/immutable/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
