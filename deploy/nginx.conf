# actufe site config — serve the static SPA build and proxy the API to actuproxy.
#
# LIVE on con1 as https://nooz.ghmr.net (deployed 2026-07-17): the upstream,
# server_name, root, and location blocks below live in (or next to) the
# nooz.ghmr.net server block of /etc/nginx/sites-available/noozeconf
# (certbot-managed TLS, 80→443 redirect). NOTE: the gzip/no-cache/asset-404
# blocks added 2026-07-20 still need to be copied to the live noozeconf.
# Deploy there: plain `npm run build` (root base path; also emits precompressed
# .gz files), then unpack build/ into /var/www/nooz (root-owned, world-readable)
# and `nginx -t && systemctl reload nginx`.
#
# On tiny the app is instead served by the altsvr site at http://tiny:8080/news/
# out of /var/www/html/altsvr/news (a real directory owned by agold — NOT a
# symlink into ~agold: nginx runs as www-data, which can't traverse /home/agold,
# so a symlink 404s). Since it's served from the /news subpath there, the build
# MUST set the base path or /_app/* asset URLs resolve to the server root and 404:
#   npm run build:tiny            # pins BASE_PATH=/news
#   rsync -a --delete ~/Prog/actufe/build/ /var/www/html/altsvr/news/
# The app requests the API at ${base}/api/articles, so altsvr needs the
# matching location (remote deploy: proxy to the public endpoint — NOT
# news.ghmr.net, which is the old Netlify frontend, not the API):
#   location = /news/api/articles {
#       proxy_pass https://www.ghmr.net/actu/api/v1/;
#       proxy_ssl_server_name on;
#   }

# actuproxy runs on con1 under supervisor (actur-cloud.conf) at 127.0.0.1:33433,
# exposed publicly as https://www.ghmr.net/actu/api/v1/. The upstream block
# enables connection keepalive to it; it must sit outside the server block
# (sites-available files are included at http{} level, so this placement works).
upstream actuproxy {
    server 127.0.0.1:33433;
    keepalive 8;
}

server {
    listen 80;
    server_name nooz.ghmr.net;          # on con1; TLS handled by certbot in noozeconf
    root /var/www/nooz;                 # contents of build/

    # Serve the .gz files precompressed by the build, and gzip on the fly
    # what has no precompressed twin (mainly the proxied article JSON).
    gzip_static on;
    gzip on;
    gzip_types application/json application/javascript text/css image/svg+xml;

    # API: replaces the old Netlify connProxy function.
    # actuproxy serves at its root, so /api/articles?q maps to /?q
    # (the query string is forwarded automatically). Bare calls without params
    # fall through to actuproxy's own defaults (the old connProxy defaulted
    # timeframe=0&timewindow=2; the SPA always sends both, so this only
    # affects hand-written curl calls).
    location = /api/articles {
        proxy_pass http://actuproxy/;
        proxy_http_version 1.1;         # required for upstream keepalive
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # Hashed build assets: cache forever. A missing asset (stale shell after a
    # redeploy, probe) is a plain 404, never the SPA shell.
    location /_app/immutable/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        error_page 404 = @asset404;
    }
    location /_app/ {
        error_page 404 = @asset404;
    }
    location @asset404 { return 404; }

    # The SPA shell must always be revalidated: a heuristically cached
    # index.html keeps referencing /_app/immutable chunks pruned by the next
    # redeploy, which blanks the app.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Static files. Prerendered pages are found via $uri.html (/login →
    # login.html, /about → about.html), so hard reloads of app routes work
    # without a hand-maintained allowlist; anything unknown is a real 404.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Serve the SPA shell as the 404 body: status is 404, but the client-side
    # router still renders the app's "404 Page not found" page.
    error_page 404 /index.html;
}
